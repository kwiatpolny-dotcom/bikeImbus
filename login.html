<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bike Imbus - Logowanie</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2E60B2">
    <style>
        .auth-bg {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }
        .auth-container {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .auth-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        .auth-logo {
            text-align: center;
            margin-bottom: 6px;
        }
        .auth-logo img {
            height: 52px;
            width: auto;
        }
        .auth-subtitle {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 30px;
            font-size: 0.95rem;
        }
        .auth-tabs {
            display: inline-flex;
            width: 100%;
            margin-bottom: 16px;
            background: rgba(184, 195, 216, 0.12);
            border: 1px solid rgba(184, 195, 216, 0.35);
            border-radius: 999px;
            padding: 4px;
        }
        .auth-tab {
            flex: 1;
            padding: 12px 18px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 999px;
            transition: background-color 0.2s ease, color 0.2s ease;
        }
        .auth-tab.active {
            background: var(--primary-color);
            color: white;
        }
        .auth-form { display: none; }
        .auth-form.active { display: block; }
        .error-message {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            display: none;
        }
        .error-message.show { display: block; }
        .success-message {
            background: #efe;
            color: #3c3;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            display: none;
        }
        .success-message.show { display: block; }
        .auth-footer {
            text-align: center;
            margin-top: 20px;
            color: var(--text-secondary);
            font-size: 0.85rem;
        }
        .auth-divider {
            display: flex;
            align-items: center;
            margin: 20px 0;
            color: var(--text-secondary);
            font-size: 0.85rem;
        }
        .auth-divider::before,
        .auth-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(184, 195, 216, 0.4);
        }
        .auth-divider span { padding: 0 12px; }
        .btn-google {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px;
            border: 1px solid rgba(184, 195, 216, 0.5);
            border-radius: 10px;
            background: white;
            color: #3c4043;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s, box-shadow 0.2s;
        }
        .btn-google:hover {
            background: #f8f9fa;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
        }
    </style>
</head>
<body>
    <svg class="auth-bg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
        <style>
            @keyframes drift-primary {
                0%   { transform: translate(0px, 0px) scale(1); }
                50%  { transform: translate(180px, 90px) scale(1.2); }
                100% { transform: translate(-80px, -70px) scale(0.9); }
            }
            @keyframes drift-accent {
                0%   { transform: translate(0px, 0px) scale(1); }
                50%  { transform: translate(-200px, -100px) scale(0.8); }
                100% { transform: translate(90px, 60px) scale(1.1); }
            }
            @keyframes drift-secondary {
                0%   { transform: translate(0px, 0px) scale(1); }
                50%  { transform: translate(-100px, 130px) scale(1.15); }
                100% { transform: translate(120px, -60px) scale(0.88); }
            }
            .blob-1 { animation: drift-primary 20s infinite alternate ease-in-out; transform-box: fill-box; transform-origin: center; }
            .blob-2 { animation: drift-accent 24s infinite alternate ease-in-out; transform-box: fill-box; transform-origin: center; }
            .blob-3 { animation: drift-secondary 17s infinite alternate ease-in-out; transform-box: fill-box; transform-origin: center; }
        </style>
        <rect width="1600" height="900" fill="#14387F"/>
        <defs>
            <filter id="blur" x="-40%" y="-40%" width="180%" height="180%" filterUnits="userSpaceOnUse">
                <feGaussianBlur stdDeviation="85"/>
            </filter>
        </defs>
        <g filter="url(#blur)">
            <circle class="blob-1" cx="300" cy="200" r="500" fill="#2E60B2" opacity="0.55"/>
            <circle class="blob-2" cx="1300" cy="700" r="450" fill="#38E8FF" opacity="0.40"/>
            <circle class="blob-3" cx="800" cy="450" r="380" fill="#B8C3D8" opacity="0.20"/>
        </g>
        <path d="M 0,150 L 1600,150 M 0,300 L 1600,300 M 0,450 L 1600,450 M 0,600 L 1600,600 M 0,750 L 1600,750 M 200,0 L 200,900 M 400,0 L 400,900 M 600,0 L 600,900 M 800,0 L 800,900 M 1000,0 L 1000,900 M 1200,0 L 1200,900 M 1400,0 L 1400,900"
              stroke="#B8C3D8" stroke-width="1" opacity="0.04"/>
    </svg>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <img src="logo.svg" alt="bikeImbus">
            </div>

            <p class="auth-subtitle">Najlepsze narzędzie w Twoim warsztacie rowerowym</p>

            <div class="auth-tabs">
                <button class="auth-tab active" data-tab="login">Logowanie</button>
                <button class="auth-tab" data-tab="register">Rejestracja</button>
            </div>

            <div id="errorMessage" class="error-message"></div>
            <div id="successMessage" class="success-message"></div>

            <form id="loginForm" class="auth-form active">
                <div class="form-group">
                    <label for="loginEmail">Email</label>
                    <input type="email" id="loginEmail" name="email" required
                        placeholder="twoj@email.pl" autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="loginPassword">Hasło</label>
                    <input type="password" id="loginPassword" name="password" required
                        placeholder="Wprowadź hasło" autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%;margin-top:10px;">
                    Zaloguj się
                </button>
            </form>

            <form id="registerForm" class="auth-form">
                <div class="form-group">
                    <label for="registerWorkshopName">Nazwa warsztatu *</label>
                    <input type="text" id="registerWorkshopName" name="workshopName" required
                        placeholder="np. Rower Serwis Kowalski">
                </div>
                <div class="form-group">
                    <label for="registerEmail">Email *</label>
                    <input type="email" id="registerEmail" name="email" required
                        placeholder="twoj@email.pl" autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="registerPassword">Hasło *</label>
                    <input type="password" id="registerPassword" name="password" required
                        placeholder="Minimum 6 znaków" autocomplete="new-password" minlength="6">
                </div>
                <div class="form-group">
                    <label for="registerPasswordConfirm">Potwierdź hasło *</label>
                    <input type="password" id="registerPasswordConfirm" name="passwordConfirm" required
                        placeholder="Powtórz hasło" autocomplete="new-password" minlength="6">
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%;margin-top:10px;">
                    Utwórz konto
                </button>
            </form>

            <div class="auth-divider"><span>lub</span></div>

            <button id="googleLoginBtn" class="btn-google">
                <svg width="20" height="20" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
                    <path fill="#4285F4" d="M47.5 24.6c0-1.6-.1-3.1-.4-4.6H24v8.7h13.2c-.6 3-2.3 5.5-4.9 7.2v6h7.9c4.6-4.3 7.3-10.6 7.3-17.3z"/>
                    <path fill="#34A853" d="M24 48c6.5 0 12-2.1 16-5.8l-7.9-6c-2.1 1.4-4.9 2.3-8.1 2.3-6.2 0-11.5-4.2-13.4-9.9H2.4v6.2C6.4 42.5 14.6 48 24 48z"/>
                    <path fill="#FBBC05" d="M10.6 28.6c-.5-1.4-.8-2.9-.8-4.6s.3-3.2.8-4.6v-6.2H2.4C.9 16.5 0 20.1 0 24s.9 7.5 2.4 10.8l8.2-6.2z"/>
                    <path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9.1 3.6l6.8-6.8C35.9 2.4 30.4 0 24 0 14.6 0 6.4 5.5 2.4 13.2l8.2 6.2C12.5 13.7 17.8 9.5 24 9.5z"/>
                </svg>
                Kontynuuj przez Google
            </button>

            <div class="auth-footer">© 2026 Bike Imbus — System zarządzania warsztatem rowerowym</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-client.js"></script>
    <script src="auth.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js');
        }
    </script>
</body>
</html>
